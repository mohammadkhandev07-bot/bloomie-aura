<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ===== META TAGS ===== -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#D4AF37" />
    
    <!-- ===== SEO TAGS ===== -->
    <title>Bloom & Aura | Premium Handcrafted Candles 🕯️</title>
    <meta name="description" content="Bloom & Aura - Premium handcrafted candles made with love and natural ingredients. Experience blooming beauty, lasting aura." />
    <meta name="keywords" content="candles, handmade candles, premium candles, natural candles, gift candles, Bloom & Aura" />
    <meta name="author" content="Bloom & Aura" />
    <meta name="robots" content="index, follow" />
    
    <!-- ===== OPEN GRAPH (Social Media) ===== -->
    <meta property="og:title" content="Bloom & Aura | Premium Handcrafted Candles 🕯️" />
    <meta property="og:description" content="Bloom & Aura - Premium handcrafted candles made with love and natural ingredients. 🌿 blooming beauty, lasting aura" />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://bloom-aura.vercel.app" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bloom & Aura" />
    
    <!-- ===== TWITTER CARD ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bloom & Aura | Premium Handcrafted Candles 🕯️" />
    <meta name="twitter:description" content="Bloom & Aura - Premium handcrafted candles made with love and natural ingredients." />
    <meta name="twitter:image" content="/logo.png" />
    
    <!-- ===== FAVICON ===== -->
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- ===== PRELOAD FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- ===== ANDROID CHROME THEME ===== -->
    <meta name="theme-color" content="#2C1810" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- ===== STRUCTURED DATA (JSON-LD) ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Bloom & Aura",
        "url": "https://bloom-aura.vercel.app",
        "logo": "https://bloom-aura.vercel.app/logo.png",
        "description": "Premium handcrafted candles made with love and natural ingredients.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Mumbai",
          "addressRegion": "Maharashtra",
          "addressCountry": "IN"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-98765-43210",
          "contactType": "customer service",
          "availableLanguage": ["English", "Hindi"]
        },
        "sameAs": [
          "https://www.instagram.com/bloomandaura",
          "https://www.facebook.com/bloomandaura",
          "https://www.youtube.com/bloomandaura"
        ]
      }
    </script>

    <!-- ===== PRODUCT SCHEMA ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Bloom & Aura Handcrafted Candles",
        "description": "Premium handcrafted candles made with natural wax and essential oils.",
        "brand": {
          "@type": "Brand",
          "name": "Bloom & Aura"
        },
        "offers": {
          "@type": "Offer",
          "priceCurrency": "INR",
          "price": "499",
          "availability": "https://schema.org/InStock"
        }
      }
    </script>

    <!-- ===== WEBSITE SCHEMA ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Bloom & Aura",
        "url": "https://bloom-aura.vercel.app",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://bloom-aura.vercel.app/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ===== FALLBACK ===== -->
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif; background: #FFF8F0; min-height: 100vh;">
        <h1 style="color: #2C1810;">🕯️ Bloom & Aura</h1>
        <p style="color: #5A3D2E;">Please enable JavaScript to experience our website.</p>
        <p style="color: #D4AF37; font-style: italic;">🌿 blooming beauty, lasting aura</p>
      </div>
    </noscript>
  </head>

  <body>
    <!-- ===== ROOT ELEMENT ===== -->
    <div id="root"></div>

    <!-- ===== LOADING INDICATOR ===== -->
    <div id="loading">
      <div class="loader-container">
        <div class="loader-candle"></div>
        <p>Bloom & Aura</p>
        <span class="loader-sub">🌿 blooming beauty, lasting aura</span>
      </div>
    </div>

    <!-- ===== MAIN SCRIPT ===== -->
    <script>
      // Hide loading indicator when app is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.style.opacity = '0';
            loading.style.transition = 'opacity 0.8s ease';
            setTimeout(function() {
              loading.style.display = 'none';
            }, 800);
          }
        }, 500);
      });
    </script>

    <!-- ===== INLINE LOADING STYLES ===== -->
    <style>
      /* Loading Screen */
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #FFF8F0 0%, #F7E8D7 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.8s ease;
      }

      .loader-container {
        text-align: center;
        animation: fadeInLoader 0.8s ease;
      }

      @keyframes fadeInLoader {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }

      /* Candle Loader */
      .loader-candle {
        width: 50px;
        height: 100px;
        background: linear-gradient(180deg, #F5E6D3 0%, #E8D5C4 50%, #D4BBA8 100%);
        border-radius: 25px 25px 12px 12px;
        margin: 0 auto 25px;
        position: relative;
        animation: glowLoader 1.5s ease-in-out infinite;
        box-shadow: 0 20px 60px rgba(44, 24, 16, 0.15);
      }

      .loader-candle::before {
        content: '';
        position: absolute;
        top: -35px;
        left: 50%;
        transform: translateX(-50%);
        width: 25px;
        height: 35px;
        background: linear-gradient(180deg, #FF6B35 0%, #FFD700 40%, #FF8C00 80%);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        animation: flickerLoader 0.15s ease-in-out infinite alternate;
        box-shadow: 0 0 40px rgba(255, 107, 53, 0.5), 0 0 80px rgba(255, 107, 53, 0.2);
      }

      .loader-candle::after {
        content: '';
        position: absolute;
        top: -25px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 60px;
        background: radial-gradient(circle, rgba(255, 107, 53, 0.2) 0%, transparent 70%);
        border-radius: 50%;
        filter: blur(20px);
        animation: glowPulseLoader 2s ease-in-out infinite;
      }

      @keyframes glowLoader {
        0%, 100% { box-shadow: 0 20px 60px rgba(44, 24, 16, 0.15); }
        50% { box-shadow: 0 20px 60px rgba(212, 175, 55, 0.25); }
      }

      @keyframes glowPulseLoader {
        0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
        50% { transform: translateX(-50%) scale(1.3); opacity: 1; }
      }

      @keyframes flickerLoader {
        0% { transform: translateX(-50%) scaleY(1) rotate(-2deg); }
        100% { transform: translateX(-50%) scaleY(0.92) rotate(2deg); }
      }

      /* Loader Stripes */
      .loader-candle .stripe {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 3px;
        background: rgba(212, 175, 55, 0.2);
        border-radius: 2px;
      }

      .loader-candle .stripe:nth-child(1) { top: 30%; width: 60%; }
      .loader-candle .stripe:nth-child(2) { top: 50%; width: 75%; }
      .loader-candle .stripe:nth-child(3) { top: 70%; width: 50%; }

      .loader-container p {
        color: #2C1810;
        font-family: 'Georgia', serif;
        font-size: 1.8rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: 2px;
      }

      .loader-sub {
        display: block;
        color: #8B7355;
        font-family: 'Georgia', serif;
        font-size: 1rem;
        font-style: italic;
        margin-top: 0.5rem;
        letter-spacing: 1px;
        animation: pulseText 2s ease-in-out infinite;
      }

      @keyframes pulseText {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      /* Responsive Loader */
      @media (max-width: 768px) {
        .loader-candle {
          width: 40px;
          height: 80px;
        }
        .loader-candle::before {
          width: 20px;
          height: 28px;
          top: -28px;
        }
        .loader-container p {
          font-size: 1.4rem;
        }
        .loader-sub {
          font-size: 0.85rem;
        }
      }

      @media (max-width: 480px) {
        .loader-candle {
          width: 35px;
          height: 70px;
        }
        .loader-candle::before {
          width: 18px;
          height: 25px;
          top: -25px;
        }
        .loader-container p {
          font-size: 1.2rem;
        }
        .loader-sub {
          font-size: 0.75rem;
        }
      }
    </style>
  </body>
</html>
