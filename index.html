<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ===== META TAGS ===== -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#D4AF37" />
    
    <!-- ===== SEO TAGS ===== -->
    <title>Bloom & Aura | Premium Handcrafted Candles 🕯️</title>
    <meta name="description" content="Discover Bloom & Aura - Premium handcrafted candles made with love and natural ingredients. Experience blooming beauty, lasting aura." />
    <meta name="keywords" content="candles, handmade candles, premium candles, natural candles, gift candles, Bloom & Aura" />
    <meta name="author" content="Bloom & Aura" />
    
    <!-- ===== OPEN GRAPH (Social Media) ===== -->
    <meta property="og:title" content="Bloom & Aura | Premium Handcrafted Candles 🕯️" />
    <meta property="og:description" content="Discover Bloom & Aura - Premium handcrafted candles made with love and natural ingredients." />
    <meta property="og:image" content="%PUBLIC_URL%/logo.png" />
    <meta property="og:url" content="https://bloom-aura.vercel.app" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <!-- ===== FAVICON ===== -->
    <link rel="icon" href="%PUBLIC_URL%/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- ===== PRELOAD FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- ===== ROBOTS ===== -->
    <meta name="robots" content="index, follow" />
    
    <!-- ===== LANGUAGE ===== -->
    <meta name="language" content="English" />

    <!-- ===== ANDROID CHROME THEME ===== -->
    <meta name="theme-color" content="#2C1810" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ===== FACEBOOK DOMAIN VERIFICATION ===== -->
    <!-- <meta property="fb:app_id" content="your_app_id" /> -->

    <!-- ===== STRUCTURED DATA (JSON-LD) ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Bloom & Aura",
        "url": "https://bloom-aura.vercel.app",
        "logo": "https://bloom-aura.vercel.app/logo.png",
        "description": "Premium handcrafted candles made with love and natural ingredients.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Mumbai",
          "addressRegion": "Maharashtra",
          "addressCountry": "IN"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-98765-43210",
          "contactType": "customer service",
          "availableLanguage": ["English", "Hindi"]
        },
        "sameAs": [
          "https://www.instagram.com/bloomandaura",
          "https://www.facebook.com/bloomandaura",
          "https://www.youtube.com/bloomandaura"
        ]
      }
    </script>

    <!-- ===== PRODUCT SCHEMA ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Bloom & Aura Handcrafted Candles",
        "description": "Premium handcrafted candles made with natural wax and essential oils.",
        "brand": {
          "@type": "Brand",
          "name": "Bloom & Aura"
        },
        "offers": {
          "@type": "Offer",
          "priceCurrency": "INR",
          "price": "499",
          "availability": "https://schema.org/InStock"
        }
      }
    </script>

    <!-- ===== PRELOAD CSS ===== -->
    <link rel="preload" href="%PUBLIC_URL%/style.css" as="style" />
    
    <!-- ===== FALLBACK ===== -->
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>🕯️ Bloom & Aura</h1>
        <p>Please enable JavaScript to experience our website.</p>
        <p>🌿 blooming beauty, lasting aura</p>
      </div>
    </noscript>
  </head>

  <body>
    <!-- ===== ROOT ELEMENT ===== -->
    <div id="root"></div>

    <!-- ===== LOADING INDICATOR ===== -->
    <div id="loading">
      <div class="loader-container">
        <div class="loader-candle"></div>
        <p>Loading Bloom & Aura...</p>
      </div>
    </div>

    <!-- ===== MAIN SCRIPT ===== -->
    <script>
      // Hide loading indicator when app is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.style.opacity = '0';
            loading.style.transition = 'opacity 0.5s ease';
            setTimeout(function() {
              loading.style.display = 'none';
            }, 500);
          }
        }, 500);
      });
    </script>

    <!-- ===== INLINE LOADING STYLES ===== -->
    <style>
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #FFF8F0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }

      .loader-container {
        text-align: center;
      }

      .loader-candle {
        width: 40px;
        height: 80px;
        background: linear-gradient(180deg, #F5E6D3, #E8D5C4);
        border-radius: 20px 20px 10px 10px;
        margin: 0 auto 20px;
        position: relative;
        animation: glow 1.5s ease-in-out infinite;
        box-shadow: 0 10px 30px rgba(44, 24, 16, 0.1);
      }

      .loader-candle::after {
        content: '';
        position: absolute;
        top: -30px;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 30px;
        background: linear-gradient(180deg, #FF6B35, #FFD700);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        animation: flicker 0.2s ease-in-out infinite alternate;
        box-shadow: 0 0 40px rgba(255, 107, 53, 0.3);
      }

      @keyframes glow {
        0%, 100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.5); }
      }

      @keyframes flicker {
        0% { transform: translateX(-50%) scaleY(1) rotate(-2deg); }
        100% { transform: translateX(-50%) scaleY(0.9) rotate(2deg); }
      }

      .loader-container p {
        color: #5A3D2E;
        font-family: 'Georgia', serif;
        font-size: 1.1rem;
        margin-top: 1rem;
        letter-spacing: 2px;
        animation: pulseText 2s ease-in-out infinite;
      }

      @keyframes pulseText {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </body>
</html>
